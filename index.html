<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario de Maquillaje</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar / Navigation -->
        <nav class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-gem"></i>
                <h2>Lumière</h2>
                <span>Makeup Inventory</span>
            </div>
            <ul class="nav-links">
                <li class="active" data-tab="inventory"><i class="fa-solid fa-box"></i> Inventario</li>
                <li data-tab="sales-history"><i class="fa-solid fa-chart-line"></i> Ventas Hoy</li>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            
            <!-- INVENTORY TAB -->
            <section id="inventory-tab" class="tab-content active">
                <header class="top-bar">
                    <h1>Catálogo de Productos</h1>
                    <button class="btn-primary" id="btn-add-product">
                        <i class="fa-solid fa-plus"></i> Nuevo Producto
                    </button>
                </header>

                <!-- Inventory Table -->
                <div class="card table-container">
                    <table id="inventory-table">
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-body">
                            <!-- Items will be generated by JS -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- SALES HISTORY TAB -->
            <section id="sales-history-tab" class="tab-content">
                <header class="top-bar">
                    <h1>Historial de Ventas</h1>
                    <div class="stats-badge">
                        <span>Total del Día: </span>
                        <strong id="daily-total">$0.00</strong>
                    </div>
                </header>

                <div class="card table-container">
                    <table id="sales-table">
                        <thead>
                            <tr>
                                <th>Hora</th>
                                <th>Productos</th>
                                <th>Método de Pago</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody id="sales-body">
                            <!-- Sales will be generated by JS -->
                        </tbody>
                    </table>
                </div>
            </section>

        </main>

        <!-- CART / SELL SIDEBAR -->
        <aside class="cart-sidebar" id="cart-sidebar">
            <div class="cart-header">
                <h2><i class="fa-solid fa-cart-shopping"></i> Venta Actual</h2>
                <button class="icon-btn" id="close-cart"><i class="fa-solid fa-times"></i></button>
            </div>
            
            <div class="cart-items" id="cart-items">
                <!-- Selected items will appear here -->
                <div class="empty-cart-msg">No hay productos seleccionados.</div>
            </div>

            <div class="cart-footer">
                <div class="cart-summary">
                    <span>Total a cobrar:</span>
                    <strong id="cart-total">$0.00</strong>
                </div>
                
                <div class="form-group">
                    <label for="payment-method">Forma de Pago</label>
                    <select id="payment-method">
                        <option value="Efectivo">Efectivo</option>
                        <option value="Transferencia">Transferencia</option>
                        <option value="Tarjeta">Tarjeta</option>
                    </select>
                </div>
                
                <button class="btn-primary full-width" id="btn-confirm-sale" disabled>
                    Confirmar Venta
                </button>
            </div>
        </aside>

    </div>

    <!-- ADD PRODUCT MODAL -->
    <div class="modal-overlay" id="add-product-modal">
        <div class="modal">
            <div class="modal-header">
                <h3>Agregar Nuevo Producto</h3>
                <button class="icon-btn close-modal"><i class="fa-solid fa-times"></i></button>
            </div>
            <div class="modal-body">
                <form id="add-product-form">
                    <div class="form-group">
                        <label for="prod-name">Nombre del Producto</label>
                        <input type="text" id="prod-name" required placeholder="Ej. Base líquida mate">
                    </div>
                    <div class="form-group">
                        <label for="prod-price">Precio de Venta ($)</label>
                        <input type="number" id="prod-price" required min="0" step="0.01" placeholder="Ej. 15.50">
                    </div>
                    <div class="form-group">
                        <label for="prod-stock">Cantidad Inicial (Stock)</label>
                        <input type="number" id="prod-stock" required min="0" placeholder="Ej. 10">
                    </div>
                    <button type="submit" class="btn-primary full-width" style="margin-top: 15px;">Guardar Producto</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
